<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lollipop Camera</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
    h1 { margin-bottom: 16px; font-size: 1.2rem; opacity: 0.7; }
    video { width: 100%; max-width: 960px; border-radius: 8px; box-shadow: 0 4px 32px rgba(0,0,0,0.6); }
    #status { margin-top: 12px; font-size: 0.85rem; opacity: 0.5; }
  </style>
</head>
<body>
  <h1>Lollipop Camera — Andrea</h1>
  <video id="video" controls autoplay muted playsinline></video>
  <p id="status">Connecting...</p>
  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');

    if (Hls.isSupported()) {
      const hls = new Hls({ debug: false });
      hls.loadSource('/stream.m3u8');
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        status.textContent = 'Stream live';
        video.play();
      });
      hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) status.textContent = 'Error: ' + data.details;
        console.error(data);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = '/stream.m3u8';
      video.addEventListener('loadedmetadata', () => { status.textContent = 'Stream live'; video.play(); });
    } else {
      status.textContent = 'HLS not supported in this browser.';
    }
  </script>
</body>
</html>
